// ─── SCREEN: External Model Designer ─────────────────────────────────────────
function ExternalDesigner({onBack}){
  const defaultSegs = ["High","Medium","Low"];

  const [cfg,setCfg]=useState({
    brand:"brand", segments:[...defaultSegs], channels:[...EXT_CHANNELS],
    startDate:"2023-01", endDate:"2024-03", unitPrice:80, modelTimePeriod:12, nSalesLag:3, ltPeriod:36,
    salesUnits:buildDefaultSalesUnits(defaultSegs),
    promoUnits:buildDefaultPromoUnits(defaultSegs, EXT_CHANNELS),
    promoCosts:{conference:31.84,detailing:28.50,e_mails:5.20,rebates:45.00,social_media:12.00,webinar:18.00},
  });

  // Segment builder state
  const [segType,setSegType]   = useState("volume");
  const [nSegs,setNSegs]       = useState(3);
  const [customSegInput,setCustomSegInput] = useState("");
  const [customSegs,setCustomSegs]         = useState([]);
  const [chosenPreset,setChosenPreset]     = useState(0); // index into preset options[]
  const [geoCountry,setGeoCountry]         = useState("USA");
  const [geoLevel,setGeoLevel]             = useState("states"); // "regions" | "states"

  // Channel builder state
  const [nChannels,setNChannels]             = useState(6);
  const [chMode,setChMode]                   = useState("library");  // "library" | "random" | "custom"
  const [customChInput,setCustomChInput]     = useState("");
  const [savedChannels,setSavedChannels]     = useState(loadStoredChannels);

  // Promo cost granularity
  const [costMode,setCostMode] = useState("channel"); // "channel" | "segment" | "matrix"

  // Per-channel adstock type: Lambda (exponential decay) or Prom_lag (explicit lag coefficients)
  const [chAdstockTypes,setChAdstockTypes] = useState(
    Object.fromEntries(EXT_CHANNELS.map(ch=>([ch, ch==="rebates"||ch==="e_mails" ? "Lambda" : "Prom_lag"])))
  );
  const setChAdstock = (ch, val) => setChAdstockTypes(t=>({...t,[ch]:val}));

  // Per-channel equation type: EXP | LOG | POW | LIN
  const [chEquationTypes,setChEquationTypes] = useState(
    Object.fromEntries(EXT_CHANNELS.map(ch=>([ch, ch==="rebates" ? "LIN" : "EXP"])))
  );
  const setChEquation = (ch, val) => setChEquationTypes(t=>({...t,[ch]:val}));

  // Accordion open/close state
  const [openSections,setOpenSections] = useState({identity:true,segments:false,channels:false,adstock:false,equation:false,sales:false,promo:false});
  const toggleSection = (key) => setOpenSections(o=>({...o,[key]:!o[key]}));

  const [gen,setGen]=useState(null);
  const [tab,setTab]=useState("RC");

  const setN=(path,val)=>setCfg(c=>{const ks=path.split(".");const cl=JSON.parse(JSON.stringify(c));let o=cl;for(let i=0;i<ks.length-1;i++)o=o[ks[i]];o[ks[ks.length-1]]=isNaN(val)?val:Number(val);return cl;});

  // Derive available preset options filtered to nSegs
  const preset = SEGMENT_PRESETS[segType];
  const presetOptions = preset.options; // arrays of names

  // Apply segment selection to cfg
  const applySegments = useCallback((segs) => {
    setCfg(c => {
      const newSalesUnits = buildDefaultSalesUnits(segs);
      const newPromoUnits = buildDefaultPromoUnits(segs, c.channels);
      return { ...c, segments: segs, salesUnits: newSalesUnits, promoUnits: newPromoUnits };
    });
  }, []);

  // Apply channel list to cfg, rebuilding promoCosts and promoUnits
  const applyChannels = useCallback((chs) => {
    setCfg(c => {
      const newPromoCosts = Object.fromEntries(chs.map(ch => [ch, c.promoCosts?.[ch] ?? parseFloat((Math.random()*50+5).toFixed(2))]));
      const newPromoUnits = Object.fromEntries(c.segments.map(seg => [seg, Object.fromEntries(chs.map(ch => [ch, c.promoUnits?.[seg]?.[ch] ?? Math.round(8000 * Math.pow(0.75, c.segments.indexOf(seg)))]))]));
      return { ...c, channels: chs, promoCosts: newPromoCosts, promoUnits: newPromoUnits };
    });
    // Initialise adstock type for any new channels (preserve existing choices)
    setChAdstockTypes(prev => {
      const next = {...prev};
      chs.forEach(ch => {
        if(!(ch in next)){
          const ADS_FOR_CH_LOCAL = {rebates:"Lambda",formulary_support:"Lambda",sample_drops:"Lambda",copay_card:"Lambda",pull_through:"Lambda",payer_education:"Lambda",GPO_contracts:"Lambda",webinar:"Lambda",webinars:"Lambda",DTC_TV:"Lambda",OOH:"Lambda"};
          next[ch] = ADS_FOR_CH_LOCAL[ch] ?? "Prom_lag";
        }
      });
      return next;
    });
    // Initialise equation type for any new channels (preserve existing choices)
    setChEquationTypes(prev => {
      const next = {...prev};
      const EQ_DEFAULTS = {rebates:"LIN",formulary_support:"LIN",sample_drops:"LIN",copay_card:"LIN",
        pull_through:"LIN",payer_education:"LIN",GPO_contracts:"LIN",field_reimbursement:"LIN",
        lunch_and_learn:"LOG",symposium:"LOG",CME_events:"LOG",emails:"LOG",samples:"LOG",
        publications:"POW",HEOR:"POW",KOL_engagement:"POW",digital_ads:"POW",direct_mail:"POW"};
      chs.forEach(ch => {
        if(!(ch in next)) next[ch] = EQ_DEFAULTS[ch] ?? "EXP";
      });
      return next;
    });
  }, []);

  const randomPickChannels = useCallback((n) => {
    const pool = [...ALL_PHARMA_CHANNELS];
    const picked = [];
    while(picked.length < Math.min(n, pool.length)){
      const idx = Math.floor(Math.random() * pool.length);
      picked.push(pool.splice(idx,1)[0]);
    }
    // pad with generic if n > pool
    while(picked.length < n) picked.push(`Ch_${picked.length+1}`);
    return picked;
  }, []);


  const addCustomChannel = useCallback(() => {
    const v = customChInput.trim().replace(/\s+/g,"_");
    if(!v) return;
    const updated = cfg.channels.includes(v) ? cfg.channels : [...cfg.channels, v];
    applyChannels(updated);
    setNChannels(updated.length);
    // save to persistent memory
    if(!savedChannels.includes(v)){
      const next = [...savedChannels, v];
      setSavedChannels(next);
      saveStoredChannels(next);
    }
    setCustomChInput("");
  }, [customChInput, cfg.channels, savedChannels, applyChannels]);

  const removeChannel = useCallback((ch) => {
    const updated = cfg.channels.filter(x => x !== ch);
    applyChannels(updated);
    setNChannels(updated.length);
  }, [cfg.channels, applyChannels]);

  const toggleLibChannel = useCallback((ch) => {
    const updated = cfg.channels.includes(ch) ? cfg.channels.filter(x=>x!==ch) : [...cfg.channels, ch];
    applyChannels(updated);
    setNChannels(updated.length);
  }, [cfg.channels, applyChannels]);

  const deleteSavedChannel = (ch) => {
    const next = savedChannels.filter(x=>x!==ch);
    setSavedChannels(next);
    saveStoredChannels(next);
  };

  // When type or preset index changes, auto-apply if not custom
  const handleSegTypeChange = (type) => {
    setSegType(type);
    setChosenPreset(0);
    if(type === "geography"){
      const geo = GEO_NAMES[geoCountry];
      const names = (geoLevel==="regions" ? geo.regions : geo.states).slice(0, nSegs);
      setNSegs(names.length);
      applySegments(names);
    } else if(type !== "custom"){
      applySegments(generateSegNames(type, nSegs));
    }
  };

  const handleGeoCountryChange = (country) => {
    setGeoCountry(country);
    if(segType === "geography"){
      const geo = GEO_NAMES[country];
      const pool = geoLevel==="regions" ? geo.regions : geo.states;
      const names = pool.slice(0, Math.min(nSegs, pool.length));
      setNSegs(names.length);
      applySegments(names);
    }
  };

  const handleGeoLevelChange = (level) => {
    setGeoLevel(level);
    if(segType === "geography"){
      const geo = GEO_NAMES[geoCountry];
      const pool = level==="regions" ? geo.regions : geo.states;
      const names = pool.slice(0, Math.min(nSegs, pool.length));
      setNSegs(names.length);
      applySegments(names);
    }
  };

  const handlePresetPick = (idx) => {
    setChosenPreset(idx);
    const opts = presetOptions[idx];
    setNSegs(opts.length);
    applySegments(opts);
  };

  // Generate segment names for any count 1-100 from a preset type
  const generateSegNames = (type, count) => {
    const prefixes = {
      volume:       (i,n) => { const labels=["Very High","High","Medium","Low","Very Low","Minimal"]; return i < labels.length ? labels[i] : `Vol_${i+1}`; },
      geography:    (i,n) => { const geo=GEO_NAMES[geoCountry]; const pool=geoLevel==="regions"?geo.regions:geo.states; return i < pool.length ? pool[i] : `GEO_${i+1}`; },
      specialty:    (i,n) => { const sp=["Cardiologist","Internist","GP","Neurologist","Oncologist","Rheumatologist","Dermatologist","Hematologist","NP_PA","Endocrinologist","Pulmonologist","Gastroenterologist","Nephrologist","Urologist","Psychiatrist"]; return i < sp.length ? sp[i] : `Specialty_${i+1}`; },
      decile:       (i,n) => n <= 10 ? `D${i+1}` : `Tier_${i+1}`,
      alphanumeric: (i,n) => n <= 26 ? `SEG_${String.fromCharCode(65+i)}` : `S${String(i+1).padStart(2,"0")}`,
    };
    const fn = prefixes[type] || ((i)=>`SEG_${i+1}`);
    return Array.from({length:count}, (_,i) => fn(i, count));
  };

  // For non-custom: generate names for any count 1-100
  const handleNSegsChange = (n) => {
    const capped = Math.max(1, Math.min(100, n));
    setNSegs(capped);
    if(segType === "custom"){
      // pad or trim custom list
      if(customSegs.length >= capped){
        applySegments(customSegs.slice(0, capped));
      } else {
        const padded = [...customSegs, ...Array.from({length:capped-customSegs.length},(_,i)=>`Custom_${customSegs.length+i+1}`)];
        applySegments(padded);
      }
    } else {
      applySegments(generateSegNames(segType, capped));
    }
  };

  const addCustomSeg = () => {
    const v = customSegInput.trim().replace(/\s+/g,"_");
    if(v && !customSegs.includes(v)){
      const next = [...customSegs, v];
      setCustomSegs(next);
      setNSegs(next.length);
      applySegments(next);
    }
    setCustomSegInput("");
  };
  const removeCustomSeg = (s) => {
    const next = customSegs.filter(x=>x!==s);
    setCustomSegs(next);
    setNSegs(next.length);
    applySegments(next);
  };

  // Initialise missing promoCost keys when mode or channels/segments change
  const getPromoCost = (ch, seg) => {
    if(costMode === "channel")  return cfg.promoCosts?.[ch]         ?? 30;
    if(costMode === "segment")  return cfg.promoCosts?.[seg]        ?? 30;
    if(costMode === "matrix")   return cfg.promoCosts?.[`${seg}__${ch}`] ?? 30;
    return 30;
  };
  const setPromoCost = (ch, seg, val) => {
    const key = costMode === "channel" ? ch : costMode === "segment" ? seg : `${seg}__${ch}`;
    setCfg(c => ({ ...c, promoCosts: { ...c.promoCosts, [key]: Number(val) } }));
  };

  const handleGen=useCallback(()=>{
    // Flatten promoCosts into per-channel costs for buildExtSpend
    const flatCosts = {};
    cfg.channels.forEach(ch => {
      cfg.segments.forEach(seg => {
        if(!flatCosts[ch]) flatCosts[ch] = {};
        flatCosts[ch][seg] = getPromoCost(ch, seg);
      });
    });
    setGen({
      sales: buildExtSales(cfg),
      spend: buildExtSpend({...cfg, promoCostMatrix: flatCosts}),
      rc:    buildExtRC({...cfg, chAdstockTypes, chEquationTypes}),
    });
    setTab("RC");
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[cfg, costMode]);

  const files=gen?{
    RC:    {label:"RC_File.csv",    rows:gen.rc,    cols:cfg.nSalesLag>0 ? ["Brand","Level","Channel","ShortTermA","Curvature","TRx_lag_1","TRx_lag_2","TRx_lag_3","Equation","Adstock_Type","Adstock_Months","Decay_Lambda","mROI","Nsales_lag"] : ["Brand","Level","Channel","ShortTermA","Curvature","Equation","Adstock_Type","Adstock_Months","Decay_Lambda","mROI","Nsales_lag"]},
    Sales: {label:"Sales_File.csv", rows:gen.sales, cols:["yearmonth","Segment_column","Sales_Unit","Unit_Price","Sales"]},
    Spend: {label:"Spend_File.csv", rows:gen.spend, cols:["Segment_column","yearmonth","Channel","Promotional_units","Promotion_Unit_Cost","Spend"]},
  }:null;


  return(
    <div style={S.app}>
      <div style={{...S.header,paddingBottom:"18px"}}>
        <h1 style={S.title}><BackBtn onBack={onBack}/><span style={S.badge()}>MMX</span>External Model</h1>
        <p style={S.subtitle}>Configure inputs to generate RC_File · Sales_File · Spend_File</p>
      </div>
      <div style={S.mainGrid}>
        <div style={{...S.panel, maxHeight:"88vh", overflowY:"auto", padding:"0"}}>

          {/* ── Accordion Helper ── */}
          {[
            {
              key:"identity", label:"Model Identity", icon:"🏷️",
              summary:`${cfg.brand} · ${cfg.startDate} → ${cfg.endDate} · $${cfg.unitPrice}/unit`,
              content:(
                <div style={{padding:"16px 20px"}}>
                  <Field label="Brand Name"><Input value={cfg.brand} onChange={v=>setCfg(c=>({...c,brand:v}))}/></Field>
                  <div style={S.grid2}>
                    <Field label="Start (YYYY-MM)"><Input value={cfg.startDate} onChange={v=>setCfg(c=>({...c,startDate:v}))}/></Field>
                    <Field label="End (YYYY-MM)"><Input value={cfg.endDate} onChange={v=>setCfg(c=>({...c,endDate:v}))}/></Field>
                  </div>
                  <div style={S.grid2}>
                    <Field label="Unit Price ($)"><NumInput value={cfg.unitPrice} onChange={v=>setCfg(c=>({...c,unitPrice:v}))}/></Field>
                    <Field label="Model Period (mo)"><NumInput value={cfg.modelTimePeriod} onChange={v=>setCfg(c=>({...c,modelTimePeriod:v}))}/></Field>
                  </div>
                  <div style={S.grid2}>
                    <Field label="# Sales Lags">
                      <NumInput value={cfg.nSalesLag} onChange={v=>setCfg(c=>({...c,nSalesLag:Math.max(0,v)}))}/>
                      <span style={{fontSize:"10px",color:textSecondary,marginTop:"4px",display:"block"}}>
                        Extends back <strong style={{color:accent}}>{cfg.nSalesLag} mo</strong> → start: <strong style={{color:accent}}>{shiftMonthBack(cfg.startDate,cfg.nSalesLag)}</strong>
                      </span>
                    </Field>
                    <Field label="LT Period (months)">
                      <NumInput value={cfg.ltPeriod} onChange={v=>setCfg(c=>({...c,ltPeriod:Math.max(1,v)}))}/>
                      <span style={{fontSize:"10px",color:textSecondary,marginTop:"4px",display:"block"}}>
                        Typical: <strong style={{color:accent}}>24</strong> · <strong style={{color:accent}}>36</strong> · <strong style={{color:accent}}>48</strong>
                      </span>
                    </Field>
                  </div>
                </div>
              )
            },
            {
              key:"segments", label:"Segments", icon:"👥",
              summary:`${cfg.segments.length} segment${cfg.segments.length!==1?"s":""} · ${SEGMENT_PRESETS[segType]?.label} · ${cfg.segments.slice(0,3).join(", ")}${cfg.segments.length>3?" …":""}`,
              content:(
                <div style={{padding:"16px 20px"}}>
                  <span style={{...S.label, marginBottom:"8px"}}>SEGMENT TYPE</span>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"14px"}}>
                    {Object.entries(SEGMENT_PRESETS).map(([key,p])=>(
                      <button key={key} onClick={()=>handleSegTypeChange(key)}
                        style={{padding:"8px 10px",borderRadius:"7px",border:`1px solid ${segType===key?accent:border}`,
                          background:segType===key?`${accent}18`:"transparent",cursor:"pointer",fontFamily:"inherit",
                          textAlign:"left",transition:"all 0.15s"}}>
                        <div style={{fontSize:"12px",marginBottom:"2px"}}>{p.icon} <span style={{color:segType===key?accent:textPrimary,fontWeight:"700",fontSize:"11px"}}>{p.label}</span></div>
                        <div style={{fontSize:"9px",color:textSecondary,lineHeight:"1.3"}}>{p.desc}</div>
                      </button>
                    ))}
                  </div>
                  <span style={{...S.label, marginBottom:"8px"}}>NUMBER OF SEGMENTS <span style={{color:accent,fontWeight:"700"}}>{nSegs}</span></span>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
                    <input type="range" min={1} max={100} value={nSegs}
                      onChange={e=>handleNSegsChange(Number(e.target.value))}
                      style={{flex:1,accentColor:accent,cursor:"pointer"}}/>
                    <input type="number" min={1} max={100} value={nSegs}
                      onChange={e=>handleNSegsChange(Math.min(100,Math.max(1,Number(e.target.value))))}
                      style={{...S.input,width:"64px",textAlign:"center"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:textSecondary,marginBottom:"12px"}}>
                    <span>1</span><span>25</span><span>50</span><span>75</span><span>100</span>
                  </div>
                  <span style={{...S.label, marginBottom:"8px"}}>SEGMENT NAMES</span>

                  {/* Geography: country + level selector */}
                  {segType === "geography" && (
                    <div style={{marginBottom:"12px"}}>
                      <span style={{...S.label,marginBottom:"6px"}}>COUNTRY</span>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"5px",marginBottom:"10px",maxHeight:"160px",overflowY:"auto"}}>
                        {GEO_COUNTRY_LIST.map(c=>(
                          <button key={c} onClick={()=>handleGeoCountryChange(c)}
                            style={{padding:"5px 8px",borderRadius:"6px",border:`1px solid ${geoCountry===c?accent:border}`,
                              background:geoCountry===c?`${accent}18`:"transparent",cursor:"pointer",fontFamily:"inherit",
                              fontSize:"11px",color:geoCountry===c?accent:textSecondary,textAlign:"left",
                              display:"flex",alignItems:"center",gap:"5px",whiteSpace:"nowrap",overflow:"hidden"}}>
                            <span>{GEO_NAMES[c].flag}</span>
                            <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{c.replace(/_/g," ")}</span>
                          </button>
                        ))}
                      </div>
                      <span style={{...S.label,marginBottom:"6px"}}>GRANULARITY</span>
                      <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
                        {["regions","states"].map(lv=>(
                          <button key={lv} onClick={()=>handleGeoLevelChange(lv)}
                            style={{...S.checkBtn(geoLevel===lv),flex:1,textTransform:"capitalize"}}>
                            {lv==="states"?"Cities / States":"Regions"}
                          </button>
                        ))}
                      </div>
                      <div style={{fontSize:"10px",color:textSecondary,marginBottom:"10px",lineHeight:"1.5"}}>
                        {GEO_NAMES[geoCountry].flag} <strong style={{color:accent}}>{geoCountry.replace(/_/g," ")}</strong> — {geoLevel==="regions"?`${GEO_NAMES[geoCountry].regions.length} regions`:`${GEO_NAMES[geoCountry].states.length} cities`} available · showing first <strong style={{color:accent}}>{nSegs}</strong>
                      </div>
                    </div>
                  )}

                  {segType !== "custom" && segType !== "geography" && presetOptions.length > 0 && (
                    <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"12px"}}>
                      {presetOptions.map((opt,i)=>(
                        <button key={i} onClick={()=>handlePresetPick(i)}
                          style={{padding:"7px 12px",borderRadius:"6px",border:`1px solid ${chosenPreset===i?accent:border}`,
                            background:chosenPreset===i?`${accent}18`:"transparent",cursor:"pointer",fontFamily:"inherit",
                            display:"flex",alignItems:"center",gap:"8px",textAlign:"left"}}>
                          <span style={{width:"14px",height:"14px",borderRadius:"50%",border:`2px solid ${chosenPreset===i?accent:border}`,
                            display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                            {chosenPreset===i&&<span style={{width:"6px",height:"6px",borderRadius:"50%",background:accent,display:"block"}}/>}
                          </span>
                          <span style={{fontSize:"11px",color:chosenPreset===i?textPrimary:textSecondary}}>{opt.join(" · ")}</span>
                        </button>
                      ))}
                    </div>
                  )}

                  {segType !== "custom" && (
                    <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"6px"}}>
                      {cfg.segments.map(s=>(
                        <span key={s} style={{fontSize:"11px",padding:"3px 10px",borderRadius:"20px",background:`${accent}18`,border:`1px solid ${accent}44`,color:accent,fontWeight:"600"}}>{s}</span>
                      ))}
                    </div>
                  )}

                  {segType === "custom" && (
                    <>
                      <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
                        <input style={{...S.input,flex:1}} placeholder="Type segment name, press Enter…" value={customSegInput}
                          onChange={e=>setCustomSegInput(e.target.value)}
                          onKeyDown={e=>e.key==="Enter"&&addCustomSeg()}/>
                        <button onClick={addCustomSeg} style={{...S.primaryBtn(),width:"auto",padding:"8px 14px",marginTop:0}}>+ Add</button>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"10px"}}>
                        {cfg.segments.map(s=>(
                          <span key={s} style={{fontSize:"11px",padding:"3px 10px",borderRadius:"20px",background:`${accent}18`,border:`1px solid ${accent}44`,color:accent,fontWeight:"600",display:"inline-flex",alignItems:"center",gap:"6px"}}>
                            {s}<span onClick={()=>removeCustomSeg(s)} style={{cursor:"pointer",opacity:0.7,fontWeight:"900",lineHeight:1}}>×</span>
                          </span>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              )
            },
            {
              key:"channels", label:"Channels", icon:"📡",
              summary:`${cfg.channels.length} channel${cfg.channels.length!==1?"s":""} · ${chMode} · ${cfg.channels.slice(0,3).join(", ")}${cfg.channels.length>3?" …":""}`,
              content:(
                <div style={{padding:"16px 20px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"14px"}}>
                    {[
                      {id:"library", icon:"📋", label:"Library"},
                      {id:"random",  icon:"🎲", label:"Random"},
                      {id:"custom",  icon:"✏️",  label:"Custom"},
                    ].map(m=>(
                      <button key={m.id} onClick={()=>{setChMode(m.id); if(m.id==="random") applyChannels(randomPickChannels(nChannels));}}
                        style={{padding:"8px 6px",borderRadius:"7px",border:`1px solid ${chMode===m.id?accent:border}`,
                          background:chMode===m.id?`${accent}18`:"transparent",cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
                        <div style={{fontSize:"14px"}}>{m.icon}</div>
                        <div style={{fontSize:"10px",fontWeight:"700",color:chMode===m.id?accent:textSecondary,letterSpacing:"0.05em"}}>{m.label}</div>
                      </button>
                    ))}
                  </div>
                  {chMode === "random" && (
                    <div style={{marginBottom:"12px"}}>
                      <span style={{...S.label,marginBottom:"6px"}}>NUMBER OF CHANNELS <span style={{color:accent,fontWeight:"700"}}>{nChannels}</span></span>
                      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"4px"}}>
                        <input type="range" min={1} max={50} value={nChannels}
                          onChange={e=>{const n=Number(e.target.value);setNChannels(n);applyChannels(randomPickChannels(n));}}
                          style={{flex:1,accentColor:accent,cursor:"pointer"}}/>
                        <input type="number" min={1} max={50} value={nChannels}
                          onChange={e=>{const n=Math.min(50,Math.max(1,Number(e.target.value)));setNChannels(n);applyChannels(randomPickChannels(n));}}
                          style={{...S.input,width:"58px",textAlign:"center"}}/>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:textSecondary,marginBottom:"8px"}}>
                        <span>1</span><span>12</span><span>25</span><span>37</span><span>50</span>
                      </div>
                      <button onClick={()=>applyChannels(randomPickChannels(nChannels))}
                        style={{fontSize:"10px",padding:"4px 12px",border:`1px solid ${border}`,borderRadius:"5px",background:"transparent",color:textSecondary,cursor:"pointer",fontFamily:"inherit"}}>
                        🔀 Re-randomize
                      </button>
                    </div>
                  )}
                  {chMode === "library" && (
                    <div style={{marginBottom:"10px"}}>
                      {Object.entries(PHARMA_CHANNEL_LIBRARY).map(([grp,chs])=>(
                        <div key={grp} style={{marginBottom:"10px"}}>
                          <div style={{fontSize:"10px",color:textSecondary,fontWeight:"700",letterSpacing:"0.08em",marginBottom:"5px"}}>{grp.toUpperCase()}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                            {chs.map(ch=>(
                              <button key={ch} onClick={()=>toggleLibChannel(ch)}
                                style={{...S.checkBtn(cfg.channels.includes(ch)),fontSize:"10px",padding:"3px 9px"}}>{ch}</button>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                  {chMode === "custom" && (
                    <div style={{marginBottom:"10px"}}>
                      <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
                        <input style={{...S.input,flex:1}} placeholder="Type channel name, press Enter…"
                          value={customChInput} onChange={e=>setCustomChInput(e.target.value)}
                          onKeyDown={e=>e.key==="Enter"&&addCustomChannel()}/>
                        <button onClick={addCustomChannel} style={{...S.primaryBtn(),width:"auto",padding:"8px 14px",marginTop:0}}>+ Add</button>
                      </div>
                      {savedChannels.length>0 && (
                        <div style={{marginBottom:"10px"}}>
                          <div style={{fontSize:"10px",color:accent,fontWeight:"700",letterSpacing:"0.08em",marginBottom:"5px"}}>💾 SAVED — click to add</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                            {savedChannels.map(ch=>(
                              <span key={ch} style={{display:"inline-flex",alignItems:"center",gap:"5px",fontSize:"10px",padding:"3px 9px",borderRadius:"5px",background:`${accentBlue}18`,border:`1px solid ${accentBlue}33`,color:accentBlue}}>
                                <span style={{cursor:"pointer"}} onClick={()=>{if(!cfg.channels.includes(ch)){applyChannels([...cfg.channels,ch]);setNChannels(cfg.channels.length+1);}}}>{ch}</span>
                                <span style={{cursor:"pointer",opacity:0.6,fontWeight:"900"}} onClick={()=>deleteSavedChannel(ch)}>×</span>
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                  <div style={{background:`${accent}08`,border:`1px solid ${accent}22`,borderRadius:"7px",padding:"10px"}}>
                    <div style={{fontSize:"10px",color:accent,fontWeight:"700",letterSpacing:"0.08em",marginBottom:"7px"}}>ACTIVE CHANNELS ({cfg.channels.length})</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                      {cfg.channels.map(ch=>(
                        <span key={ch} style={{fontSize:"10px",padding:"3px 8px",borderRadius:"20px",background:`${accent}18`,border:`1px solid ${accent}44`,color:accent,display:"inline-flex",alignItems:"center",gap:"5px"}}>
                          {ch}<span onClick={()=>removeChannel(ch)} style={{cursor:"pointer",opacity:0.6,fontWeight:"900",lineHeight:1}}>×</span>
                        </span>
                      ))}
                    </div>
                  </div>
                </div>
              )
            },
            {
              key:"adstock", label:"Adstock Config", icon:"⏱️",
              summary:`${cfg.channels.length} channels · ${Object.values(chAdstockTypes).filter(v=>v==="Lambda").length} Lambda · ${Object.values(chAdstockTypes).filter(v=>v==="Prom_lag").length} Prom_lag`,
              content:(
                <div style={{padding:"16px 20px"}}>
                  {/* Legend */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"12px"}}>
                    <div style={{background:`${accent}0D`,border:`1px solid ${accent}22`,borderRadius:"6px",padding:"8px 10px"}}>
                      <div style={{fontSize:"11px",fontWeight:"700",color:accent,marginBottom:"3px"}}>λ Lambda</div>
                      <div style={{fontSize:"10px",color:textSecondary,lineHeight:"1.4"}}>Exponential decay · Decay_Lambda &gt; 0 · lag coeffs = 0</div>
                    </div>
                    <div style={{background:`${accentBlue}0D`,border:`1px solid ${accentBlue}22`,borderRadius:"6px",padding:"8px 10px"}}>
                      <div style={{fontSize:"11px",fontWeight:"700",color:accentBlue,marginBottom:"3px"}}>📊 Prom_lag</div>
                      <div style={{fontSize:"10px",color:textSecondary,lineHeight:"1.4"}}>Explicit lags [0.7→0.05] · Decay_Lambda = 0</div>
                    </div>
                  </div>

                  {/* Quick set all */}
                  <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
                    <button onClick={()=>setChAdstockTypes(Object.fromEntries(cfg.channels.map(ch=>[ch,"Lambda"])))}
                      style={{flex:1,padding:"5px 0",borderRadius:"5px",border:`1px solid ${accent}`,background:"transparent",
                        color:accent,fontSize:"10px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit",letterSpacing:"0.04em"}}>
                      All → λ Lambda
                    </button>
                    <button onClick={()=>setChAdstockTypes(Object.fromEntries(cfg.channels.map(ch=>[ch,"Prom_lag"])))}
                      style={{flex:1,padding:"5px 0",borderRadius:"5px",border:`1px solid ${accentBlue}`,background:"transparent",
                        color:accentBlue,fontSize:"10px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit",letterSpacing:"0.04em"}}>
                      All → 📊 Prom_lag
                    </button>
                  </div>

                  {/* Per-channel rows — compact 2-col layout */}
                  <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                    {cfg.channels.map(ch=>{
                      const cur = chAdstockTypes[ch] || "Prom_lag";
                      return(
                        <div key={ch} style={{display:"grid",gridTemplateColumns:"1fr auto",alignItems:"center",gap:"8px",
                          background:surfaceLight,border:`1px solid ${cur==="Lambda"?`${accent}44`:`${accentBlue}44`}`,
                          borderRadius:"7px",padding:"8px 12px",boxSizing:"border-box",width:"100%"}}>
                          {/* Channel name — truncates if too long */}
                          <span style={{fontSize:"11px",fontWeight:"600",color:textPrimary,
                            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                            {ch}
                          </span>
                          {/* Toggle pill */}
                          <div style={{display:"flex",borderRadius:"5px",overflow:"hidden",border:`1px solid ${border}`,flexShrink:0}}>
                            <button onClick={()=>setChAdstock(ch,"Lambda")}
                              style={{padding:"3px 10px",border:"none",fontSize:"10px",fontWeight:"700",
                                cursor:"pointer",fontFamily:"inherit",transition:"all 0.12s",whiteSpace:"nowrap",
                                background:cur==="Lambda"?accent:surfaceLight,
                                color:cur==="Lambda"?bg:textSecondary}}>
                              λ Lambda
                            </button>
                            <button onClick={()=>setChAdstock(ch,"Prom_lag")}
                              style={{padding:"3px 10px",border:"none",fontSize:"10px",fontWeight:"700",
                                cursor:"pointer",fontFamily:"inherit",transition:"all 0.12s",whiteSpace:"nowrap",
                                background:cur==="Prom_lag"?accentBlue:surfaceLight,
                                color:cur==="Prom_lag"?bg:textSecondary}}>
                              Prom_lag
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )
            },
            {
              key:"equation", label:"Equation Type", icon:"📈",
              summary:`${cfg.channels.map(ch=>(chEquationTypes[ch]||"EXP")).join(", ").slice(0,60)}${cfg.channels.length>6?" …":""}`,
              content:(
                <div style={{padding:"16px 20px"}}>
                  {/* Legend */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"12px"}}>
                    {[
                      {eq:"EXP", color:accent,      label:"EXP",  desc:"1 − e^(−c·x)  · saturating"},
                      {eq:"LOG", color:accentBlue,  label:"LOG",  desc:"log(1 + c·x)  · log-curve"},
                      {eq:"POW", color:accentAmber, label:"POW",  desc:"x^c  · curvature ≤ 0.99"},
                      {eq:"LIN", color:textSecondary,label:"LIN", desc:"c·x  · linear (rebates)"},
                    ].map(({eq,color,label,desc})=>(
                      <div key={eq} style={{background:`${color}0D`,border:`1px solid ${color}22`,borderRadius:"6px",padding:"7px 10px"}}>
                        <div style={{fontSize:"11px",fontWeight:"700",color,marginBottom:"2px"}}>{label}</div>
                        <div style={{fontSize:"9px",color:textSecondary,lineHeight:"1.3"}}>{desc}</div>
                      </div>
                    ))}
                  </div>

                  {/* Quick set all */}
                  <div style={{display:"flex",gap:"5px",marginBottom:"12px",flexWrap:"wrap"}}>
                    {["EXP","LOG","POW","LIN"].map(eq=>(
                      <button key={eq} onClick={()=>setChEquationTypes(Object.fromEntries(cfg.channels.map(ch=>[ch,eq])))}
                        style={{flex:1,minWidth:"40px",padding:"4px 0",borderRadius:"5px",border:`1px solid ${border}`,background:"transparent",
                          color:textSecondary,fontSize:"10px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>
                        All→{eq}
                      </button>
                    ))}
                  </div>

                  {/* Per-channel 4-button pill */}
                  <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                    {cfg.channels.map(ch=>{
                      const cur = chEquationTypes[ch] || "EXP";
                      const colors = {EXP:accent, LOG:accentBlue, POW:accentAmber, LIN:textSecondary};
                      const curColor = colors[cur] || accent;
                      return(
                        <div key={ch} style={{display:"grid",gridTemplateColumns:"1fr auto",alignItems:"center",gap:"8px",
                          background:surfaceLight,border:`1px solid ${curColor}44`,
                          borderRadius:"7px",padding:"8px 12px",boxSizing:"border-box"}}>
                          <span style={{fontSize:"11px",fontWeight:"600",color:textPrimary,
                            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ch}</span>
                          <div style={{display:"flex",borderRadius:"5px",overflow:"hidden",border:`1px solid ${border}`,flexShrink:0}}>
                            {["EXP","LOG","POW","LIN"].map(eq=>{
                              const eqColor = {EXP:accent,LOG:accentBlue,POW:accentAmber,LIN:textSecondary}[eq];
                              return(
                                <button key={eq} onClick={()=>setChEquation(ch,eq)}
                                  style={{padding:"3px 9px",border:"none",fontSize:"10px",fontWeight:"700",
                                    cursor:"pointer",fontFamily:"inherit",transition:"all 0.12s",whiteSpace:"nowrap",
                                    background:cur===eq?eqColor:surfaceLight,
                                    color:cur===eq?bg:textSecondary}}>
                                  {eq}
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{marginTop:"10px",fontSize:"10px",color:textSecondary,lineHeight:"1.5",
                    background:`${accentAmber}0D`,border:`1px solid ${accentAmber}22`,borderRadius:"5px",padding:"7px 10px"}}>
                    ⚠️ <strong style={{color:accentAmber}}>POW curvature</strong> is capped at 0.99 in the RC file to ensure diminishing returns
                  </div>
                </div>
              )
            },
            {
              key:"sales", label:"Sales Units", icon:"💊",
              summary:`${cfg.segments.map(s=>`${s}: ${(cfg.salesUnits[s]||0).toLocaleString()}`).slice(0,2).join(" · ")}${cfg.segments.length>2?" …":""}`,
              content:(
                <div style={{padding:"16px 20px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                    {cfg.segments.map(seg=>(
                      <div key={seg}>
                        <label style={{...S.label,marginBottom:"4px",fontSize:"10px"}}>{seg}</label>
                        <NumInput value={cfg.salesUnits[seg]||0} onChange={v=>setN(`salesUnits.${seg}`,v)}/>
                      </div>
                    ))}
                  </div>
                </div>
              )
            },
            {
              key:"promo", label:"Promo Unit Cost", icon:"💰",
              summary: costMode==="channel" ? `By channel · ${cfg.channels.slice(0,2).map(ch=>`${ch}: $${cfg.promoCosts?.[ch]??30}`).join(", ")}${cfg.channels.length>2?" …":""}` :
                       costMode==="segment" ? `By segment · ${cfg.segments.slice(0,2).map(s=>`${s}: $${cfg.promoCosts?.[s]??30}`).join(", ")}${cfg.segments.length>2?" …":""}` :
                       `Channel × Segment matrix · ${cfg.segments.length}×${cfg.channels.length} cells`,
              content:(
                <div style={{padding:"16px 20px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"16px"}}>
                    {[
                      {id:"channel", icon:"📡", label:"By Channel",   desc:"One cost per channel"},
                      {id:"segment", icon:"👥", label:"By Segment",   desc:"One cost per segment"},
                      {id:"matrix",  icon:"⊞",  label:"Ch × Seg",     desc:"Unique per combination"},
                    ].map(m=>(
                      <button key={m.id} onClick={()=>setCostMode(m.id)}
                        style={{padding:"9px 6px",borderRadius:"7px",border:`1px solid ${costMode===m.id?accent:border}`,
                          background:costMode===m.id?`${accent}18`:"transparent",cursor:"pointer",fontFamily:"inherit",textAlign:"center",transition:"all 0.15s"}}>
                        <div style={{fontSize:"16px",marginBottom:"3px"}}>{m.icon}</div>
                        <div style={{fontSize:"10px",fontWeight:"700",color:costMode===m.id?accent:textPrimary,marginBottom:"2px"}}>{m.label}</div>
                        <div style={{fontSize:"9px",color:textSecondary,lineHeight:"1.3"}}>{m.desc}</div>
                      </button>
                    ))}
                  </div>
                  {costMode === "channel" && (
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"8px"}}>
                      {cfg.channels.map(ch=>(
                        <div key={ch}>
                          <label style={{...S.label,marginBottom:"4px",fontSize:"10px"}}>{ch}</label>
                          <div style={{position:"relative"}}>
                            <span style={{position:"absolute",left:"10px",top:"50%",transform:"translateY(-50%)",color:textSecondary,fontSize:"12px"}}>$</span>
                            <input type="number" step="0.01" value={cfg.promoCosts?.[ch]??30}
                              onChange={e=>setPromoCost(ch,null,e.target.value)}
                              style={{...S.input,paddingLeft:"22px"}}/>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                  {costMode === "segment" && (
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"8px"}}>
                      {cfg.segments.map(seg=>(
                        <div key={seg}>
                          <label style={{...S.label,marginBottom:"4px",fontSize:"10px"}}>{seg}</label>
                          <div style={{position:"relative"}}>
                            <span style={{position:"absolute",left:"10px",top:"50%",transform:"translateY(-50%)",color:textSecondary,fontSize:"12px"}}>$</span>
                            <input type="number" step="0.01" value={cfg.promoCosts?.[seg]??30}
                              onChange={e=>setPromoCost(null,seg,e.target.value)}
                              style={{...S.input,paddingLeft:"22px"}}/>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                  {costMode === "matrix" && (
                    <div style={{overflowX:"auto",marginBottom:"8px"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"11px"}}>
                        <thead>
                          <tr>
                            <th style={{...S.th,background:surfaceLight,position:"sticky",left:0,zIndex:1,minWidth:"80px"}}>Seg ╲ Ch</th>
                            {cfg.channels.map(ch=>(
                              <th key={ch} style={{...S.th,background:surfaceLight,textAlign:"center",padding:"5px 6px",fontSize:"9px"}}>
                                {ch.length>9?ch.slice(0,8)+"…":ch}
                              </th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {cfg.segments.map(seg=>(
                            <tr key={seg}>
                              <td style={{...S.td,fontWeight:"700",color:accent,background:surfaceLight,position:"sticky",left:0,fontSize:"10px",padding:"4px 6px",whiteSpace:"nowrap"}}>
                                {seg.length>9?seg.slice(0,8)+"…":seg}
                              </td>
                              {cfg.channels.map(ch=>(
                                <td key={ch} style={{...S.td,padding:"3px 4px"}}>
                                  <input type="number" step="0.01"
                                    value={cfg.promoCosts?.[`${seg}__${ch}`]??30}
                                    onChange={e=>setPromoCost(ch,seg,e.target.value)}
                                    style={{width:"64px",background:surfaceLight,border:`1px solid ${border}`,borderRadius:"5px",
                                      color:textPrimary,padding:"4px 6px",fontSize:"11px",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
                                </td>
                              ))}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                      <div style={{fontSize:"10px",color:textSecondary,marginTop:"6px"}}>💡 Each cell = cost ($) for that Segment × Channel</div>
                    </div>
                  )}
                </div>
              )
            },
          ].map(({key,label,icon,summary,content})=>(
            <div key={key} style={{borderBottom:`1px solid ${border}`}}>
              {/* Accordion Header */}
              <button onClick={()=>toggleSection(key)} style={{
                width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"14px 20px", background:"transparent", border:"none", cursor:"pointer",
                fontFamily:"inherit", textAlign:"left", gap:"10px",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:"10px",minWidth:0}}>
                  <span style={{fontSize:"16px",flexShrink:0}}>{icon}</span>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:"12px",fontWeight:"700",color:openSections[key]?accent:textPrimary,letterSpacing:"0.04em"}}>{label}</div>
                    {!openSections[key] && (
                      <div style={{fontSize:"10px",color:textSecondary,marginTop:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"280px"}}>{summary}</div>
                    )}
                  </div>
                </div>
                <span style={{color:openSections[key]?accent:textSecondary,fontSize:"16px",flexShrink:0,transition:"transform 0.2s",transform:openSections[key]?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
              </button>
              {/* Accordion Body */}
              {openSections[key] && content}
            </div>
          ))}

          {/* Generate Button */}
          <div style={{padding:"16px 20px"}}>
            <button style={{...S.primaryBtn(), marginTop:"0"}} onClick={handleGen} disabled={cfg.segments.length===0||cfg.channels.length===0}>
              ▶ GENERATE FILES
            </button>
          </div>
        </div>

        <PreviewPanel files={files} activeTab={tab} setActiveTab={setTab} tabKeys={["RC","Sales","Spend"]} onGenerate={handleGen} genDisabled={cfg.segments.length===0||cfg.channels.length===0} genColor={accent}/>
      </div>
    </div>
  );
}

// ─── SCREEN: Basic Model Designer ────────────────────────────────────────────
// ─── Categorical Variable Library ────────────────────────────────────────────
const CAT_VAR_LIBRARY = {
  geographical_area: { label:"Geographical Area", icon:"🗺️",
    values:["Northeast","Southeast","Midwest","Southwest","West","Northwest"] },
  drug_volume:       { label:"Drug Volume",        icon:"💊",
    values:["Very_High","High","Medium","Low","Very_Low"] },
  region:            { label:"Region",             icon:"📍",
    values:["Region_1","Region_2","Region_3","Region_4","Region_5","Region_6"] },
  category:          { label:"Category",           icon:"🏷️",
    values:["Category_A","Category_B","Category_C","Category_D"] },
  specialty:         { label:"HCP Specialty",      icon:"🩺",
    values:["Cardiologist","Internist","GP","Neurologist","Oncologist","Rheumatologist","Dermatologist"] },
  market_tier:       { label:"Market Tier",        icon:"📊",
    values:["Tier_1","Tier_2","Tier_3","Tier_4"] },
  payer_type:        { label:"Payer Type",         icon:"💳",
    values:["Commercial","Medicare","Medicaid","Cash_Pay","Other"] },
  channel_affinity:  { label:"Channel Affinity",   icon:"📡",
    values:["Digital_First","Field_First","Balanced","Low_Engagement"] },
  custom:            { label:"Custom",             icon:"✏️",  values:[] },
};

function BasicModelDesigner({onBack}){
  const [cfg,setCfg]=useState({brand:"Test_Brand",nSegments:5,nHCP:500,nMonths:24,nChannels:6,nLags:3,nAdstock:3,noiseRatio:0.1,secondaryNoise:0.02,valueIntercept:20,valueAsymptote:5,valueLag:0.5,startMonth:"2020-01",curvature:1.0,distPoisson:0.5,distNormal:0.25,distFlat:0.25,trExp:0.5,trLog:0.25,trPower:0.2,trLinear:0.05,
    channelNames:["conference","detailing","e_mails","social_media","webinar","rebates"],
    catVarDefs:[ // each: {name, type, values[]}
      {name:"geographical_area", type:"geographical_area", values:["Northeast","Southeast","Midwest","Southwest","West"]},
    ]
  });
  // Channel picker state (mirrors External Model)
  const [basicChMode,setBasicChMode]           = useState("library");
  const [basicNChannels,setBasicNChannels]      = useState(6);
  const [basicCustomChInput,setBasicCustomChInput] = useState("");
  const [basicSavedChs,setBasicSavedChs]        = useState(loadStoredChannels);

  const applyBasicChannels = useCallback((chs)=>{
    setCfg(c=>({...c, channelNames:chs, nChannels:chs.length}));
  },[]);

  const basicRandomPick = useCallback((n)=>{
    const pool=[...ALL_PHARMA_CHANNELS];
    const picked=[];
    while(picked.length<Math.min(n,pool.length)){const idx=Math.floor(Math.random()*pool.length);picked.push(pool.splice(idx,1)[0]);}
    while(picked.length<n) picked.push(`Ch_${picked.length+1}`);
    return picked;
  },[]);

  const addBasicCustomCh = useCallback(()=>{
    const v=basicCustomChInput.trim().replace(/\s+/g,"_");
    if(!v) return;
    const current=cfg.channelNames||[];
    const updated=current.includes(v)?current:[...current,v];
    applyBasicChannels(updated);
    if(!basicSavedChs.includes(v)){const next=[...basicSavedChs,v];setBasicSavedChs(next);saveStoredChannels(next);}
    setBasicCustomChInput("");
  },[basicCustomChInput,cfg.channelNames,basicSavedChs,applyBasicChannels]);

  const removeBasicCh = useCallback((ch)=>{
    applyBasicChannels((cfg.channelNames||[]).filter(x=>x!==ch));
  },[cfg.channelNames,applyBasicChannels]);

  const toggleBasicLibCh = useCallback((ch)=>{
    const current=cfg.channelNames||[];
    applyBasicChannels(current.includes(ch)?current.filter(x=>x!==ch):[...current,ch]);
  },[cfg.channelNames,applyBasicChannels]);

  const [newCatType,setNewCatType]   = useState("geographical_area");
  const [newCatName,setNewCatName]   = useState("");
  const [newCatCustomVal,setNewCatCustomVal] = useState("");
  // Accordion state
  const [openB,setOpenB] = useState({structure:true,channels:false,model:false,distributions:false,catvars:false});
  const toggleB = (key) => setOpenB(o=>({...o,[key]:!o[key]}));

  const [gen,setGen]=useState(null);
  const [tab,setTab]=useState("Panel");
  const [loading,setLoading]=useState(false);

  const s=(k,v)=>setCfg(c=>({...c,[k]:Number(v)}));

  const handleGen=useCallback(()=>{
    setLoading(true);
    setTimeout(()=>{
      try{
        const result=buildBasicModel(cfg);
        setGen(result);setTab("Panel");
      }catch(e){console.error(e);}
      setLoading(false);
    },50);
  },[cfg]);

  const files=gen?{
    Panel:{label:"Actual_Data.csv",rows:gen.panelRows,cols:["HCP_ID","Month_ID","Seg_column",...gen.meta.catVarNames,...gen.meta.channels,"Sales_with_noise","Brand"]},
    Config:{label:"Ground_Truth.csv",rows:gen.configRows,cols:["Segment","Channel","Distribution","Transformation","Adstock_Lambda","Mean_Promo","Asymptote","Intercept","Lag_Sum","Curvature"]},
  }:null;

  return(
    <div style={S.app}>
      <div style={{...S.header,paddingBottom:"18px"}}>
        <h1 style={S.title}><BackBtn onBack={onBack}/><span style={S.badge(accentBlue)}>BASIC</span>Basic Model Dataset Generator</h1>
        <p style={S.subtitle}>Synthetic HCP-level panel data with configurable channels, segments, adstock & response curves</p>
      </div>
      <div style={S.mainGrid}>
        <div style={{...S.panel, maxHeight:"88vh", overflowY:"auto", padding:"0"}}>
          {[
            {
              key:"structure", label:"Dataset Structure", icon:"🏗️",
              summary:`${cfg.brand} · ${cfg.nSegments} segs · ${cfg.nHCP} HCPs · ${cfg.nMonths} months · starts ${cfg.startMonth}`,
              content:(
                <div style={{padding:"16px 20px"}}>
                  <Field label="Brand Name"><input style={S.input} value={cfg.brand} onChange={e=>setCfg(c=>({...c,brand:e.target.value}))}/></Field>
                  <div style={S.grid2}>
                    <Field label="# Segments"><NumInput value={cfg.nSegments} onChange={v=>s("nSegments",v)}/></Field>
                    <Field label="# HCPs"><NumInput value={cfg.nHCP} onChange={v=>s("nHCP",v)}/></Field>
                    <Field label="# Months"><NumInput value={cfg.nMonths} onChange={v=>s("nMonths",v)}/></Field>
                    <Field label="# Lags"><NumInput value={cfg.nLags} onChange={v=>s("nLags",v)}/></Field>
                    <Field label="Adstock Months"><NumInput value={cfg.nAdstock} onChange={v=>s("nAdstock",v)}/></Field>
                  </div>
                  <Field label="Start Month (YYYY-MM)"><Input value={cfg.startMonth} onChange={v=>setCfg(c=>({...c,startMonth:v}))}/></Field>
                </div>
              )
            },
            {
              key:"channels", label:"Channels", icon:"📡",
              summary:`${(cfg.channelNames||[]).length} channels · ${basicChMode} · ${(cfg.channelNames||[]).slice(0,3).join(", ")}${(cfg.channelNames||[]).length>3?" …":""}`,
              content:(
                <div style={{padding:"16px 20px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"12px"}}>
                    {[{id:"library",icon:"📋",label:"Library"},{id:"random",icon:"🎲",label:"Random"},{id:"custom",icon:"✏️",label:"Custom"}].map(m=>(
                      <button key={m.id} onClick={()=>{setBasicChMode(m.id);if(m.id==="random")applyBasicChannels(basicRandomPick(basicNChannels));}}
                        style={{padding:"7px 6px",borderRadius:"7px",border:`1px solid ${basicChMode===m.id?accentBlue:border}`,
                          background:basicChMode===m.id?`${accentBlue}18`:"transparent",cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
                        <div style={{fontSize:"13px"}}>{m.icon}</div>
                        <div style={{fontSize:"10px",fontWeight:"700",color:basicChMode===m.id?accentBlue:textSecondary}}>{m.label}</div>
                      </button>
                    ))}
                  </div>
                  {basicChMode==="random" && (
                    <div style={{marginBottom:"12px"}}>
                      <span style={{...S.label,marginBottom:"6px"}}>NUMBER OF CHANNELS <span style={{color:accentBlue,fontWeight:"700"}}>{basicNChannels}</span></span>
                      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"4px"}}>
                        <input type="range" min={1} max={50} value={basicNChannels}
                          onChange={e=>{const n=Number(e.target.value);setBasicNChannels(n);applyBasicChannels(basicRandomPick(n));}}
                          style={{flex:1,accentColor:accentBlue,cursor:"pointer"}}/>
                        <input type="number" min={1} max={50} value={basicNChannels}
                          onChange={e=>{const n=Math.min(50,Math.max(1,Number(e.target.value)));setBasicNChannels(n);applyBasicChannels(basicRandomPick(n));}}
                          style={{...S.input,width:"58px",textAlign:"center"}}/>
                      </div>
                      <button onClick={()=>applyBasicChannels(basicRandomPick(basicNChannels))}
                        style={{fontSize:"10px",padding:"4px 12px",border:`1px solid ${border}`,borderRadius:"5px",background:"transparent",color:textSecondary,cursor:"pointer",fontFamily:"inherit"}}>
                        🔀 Re-randomize
                      </button>
                    </div>
                  )}
                  {basicChMode==="library" && (
                    <div style={{marginBottom:"10px"}}>
                      {Object.entries(PHARMA_CHANNEL_LIBRARY).map(([grp,chs])=>(
                        <div key={grp} style={{marginBottom:"8px"}}>
                          <div style={{fontSize:"10px",color:textSecondary,fontWeight:"700",letterSpacing:"0.08em",marginBottom:"4px"}}>{grp.toUpperCase()}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                            {chs.map(ch=>(
                              <button key={ch} onClick={()=>toggleBasicLibCh(ch)}
                                style={{...S.checkBtn((cfg.channelNames||[]).includes(ch),accentBlue),fontSize:"10px",padding:"3px 9px"}}>{ch}</button>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                  {basicChMode==="custom" && (
                    <div style={{marginBottom:"10px"}}>
                      <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
                        <input style={{...S.input,flex:1}} placeholder="Type channel name, press Enter…"
                          value={basicCustomChInput} onChange={e=>setBasicCustomChInput(e.target.value)}
                          onKeyDown={e=>e.key==="Enter"&&addBasicCustomCh()}/>
                        <button onClick={addBasicCustomCh} style={{...S.primaryBtn(accentBlue),width:"auto",padding:"8px 12px",marginTop:0}}>+ Add</button>
                      </div>
                      {basicSavedChs.length>0 && (
                        <div style={{marginBottom:"8px"}}>
                          <div style={{fontSize:"10px",color:accentBlue,fontWeight:"700",letterSpacing:"0.08em",marginBottom:"5px"}}>💾 SAVED — click to add</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                            {basicSavedChs.map(ch=>(
                              <span key={ch} style={{display:"inline-flex",alignItems:"center",gap:"4px",fontSize:"10px",padding:"3px 9px",borderRadius:"5px",background:`${accentBlue}18`,border:`1px solid ${accentBlue}33`,color:accentBlue}}>
                                <span style={{cursor:"pointer"}} onClick={()=>{if(!(cfg.channelNames||[]).includes(ch))applyBasicChannels([...(cfg.channelNames||[]),ch]);}}>{ch}</span>
                                <span style={{cursor:"pointer",opacity:0.6,fontWeight:"900"}} onClick={()=>{const next=basicSavedChs.filter(x=>x!==ch);setBasicSavedChs(next);saveStoredChannels(next);}}>×</span>
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                  <div style={{background:`${accentBlue}08`,border:`1px solid ${accentBlue}22`,borderRadius:"7px",padding:"10px"}}>
                    <div style={{fontSize:"10px",color:accentBlue,fontWeight:"700",letterSpacing:"0.08em",marginBottom:"6px"}}>ACTIVE CHANNELS ({(cfg.channelNames||[]).length})</div>

              content:(

                    Each HCP gets a fixed random value per variable — consistent across all months. Columns appear between <strong style={{color:accentBlue}}>Seg_column</strong> and the channel columns.
                  </div>
                  {cfg.catVarDefs.map((cv,idx)=>(
                    <div key={idx} style={{background:surfaceLight,border:`1px solid ${border}`,borderRadius:"7px",padding:"10px 12px",marginBottom:"8px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"10px"}}>
                      <div style={{minWidth:0}}>
                        <div style={{fontSize:"12px",fontWeight:"700",color:accentBlue}}>{cv.name}</div>
                        <div style={{fontSize:"10px",color:textSecondary,marginTop:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"260px"}}>{cv.values.join(" · ")}</div>
                      </div>
                      <button onClick={()=>setCfg(c=>({...c,catVarDefs:c.catVarDefs.filter((_,i)=>i!==idx)}))}
                        style={{background:"none",border:`1px solid ${border}`,color:textSecondary,borderRadius:"5px",padding:"3px 8px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>✕</button>
                    </div>
                  ))}
                  <div style={{background:`${accentBlue}08`,border:`1px solid ${accentBlue}22`,borderRadius:"8px",padding:"12px"}}>
                    <div style={{fontSize:"10px",fontWeight:"700",color:accentBlue,letterSpacing:"0.1em",marginBottom:"10px"}}>+ ADD VARIABLE</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"8px"}}>
                      {Object.entries(CAT_VAR_LIBRARY).map(([key,p])=>(
                        <button key={key} onClick={()=>{setNewCatType(key);setNewCatName(key==="custom"?"":key);}}
                          style={{padding:"7px 10px",borderRadius:"6px",border:`1px solid ${newCatType===key?accentBlue:border}`,

                    {newCatType!=="custom" && CAT_VAR_LIBRARY[newCatType]?.values.length>0 && (
