                      </div>
                    )}
                    {newCatType==="custom" && (
                      <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
                        <input style={{...S.input,flex:1}} placeholder="Add value, press Enter"
                          value={newCatCustomVal} onChange={e=>setNewCatCustomVal(e.target.value)}
                          onKeyDown={e=>{if(e.key==="Enter"&&newCatCustomVal.trim()){const v=newCatCustomVal.trim().replace(/\s+/g,"_");setCfg(c=>{const ex=c.catVarDefs.find(x=>x.name===newCatName&&x.type==="custom");if(ex)return{...c,catVarDefs:c.catVarDefs.map(x=>x.name===newCatName&&x.type==="custom"?{...x,values:[...x.values,v]}:x)};return c;});setNewCatCustomVal("");}}}/>
                        <button onClick={()=>{const v=newCatCustomVal.trim().replace(/\s+/g,"_");if(!v)return;setCfg(c=>{const ex=c.catVarDefs.find(x=>x.name===newCatName&&x.type==="custom");if(ex)return{...c,catVarDefs:c.catVarDefs.map(x=>x.name===newCatName&&x.type==="custom"?{...x,values:[...x.values,v]}:x)};return c;});setNewCatCustomVal("");}}
                          style={{...S.primaryBtn(accentBlue),width:"auto",padding:"8px 12px",marginTop:0}}>+ Val</button>
                      </div>
                    )}
                    <button onClick={()=>{
                      const name=(newCatName||newCatType).replace(/\s+/g,"_");
                      if(!name) return;
                      const vals=newCatType==="custom"?(cfg.catVarDefs.find(x=>x.name===name&&x.type==="custom")?.values||[]):CAT_VAR_LIBRARY[newCatType].values;
                      if(vals.length===0){alert("Add at least one value for custom variable");return;}
                      if(cfg.catVarDefs.find(x=>x.name===name)){alert(`Column "${name}" already exists`);return;}
                      setCfg(c=>({...c,catVarDefs:[...c.catVarDefs,{name,type:newCatType,values:vals}]}));
                      setNewCatName("");setNewCatType("geographical_area");
                    }} style={{...S.primaryBtn(accentBlue),marginTop:"4px"}}>
                      + Add "{(newCatName||newCatType).replace(/\s+/g,"_")}" Column
                    </button>
                  </div>
                </div>
              )
            },
          ].map(({key,label,icon,summary,content})=>(
            <div key={key} style={{borderBottom:`1px solid ${border}`}}>
              <button onClick={()=>toggleB(key)} style={{
                width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
                padding:"14px 20px",background:"transparent",border:"none",cursor:"pointer",
                fontFamily:"inherit",textAlign:"left",gap:"10px",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:"10px",minWidth:0}}>
                  <span style={{fontSize:"16px",flexShrink:0}}>{icon}</span>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:"12px",fontWeight:"700",color:openB[key]?accentBlue:textPrimary,letterSpacing:"0.04em"}}>{label}</div>
                    {!openB[key]&&<div style={{fontSize:"10px",color:textSecondary,marginTop:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"280px"}}>{summary}</div>}
                  </div>
                </div>
                <span style={{color:openB[key]?accentBlue:textSecondary,fontSize:"16px",flexShrink:0,transition:"transform 0.2s",transform:openB[key]?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
              </button>
              {openB[key]&&content}
            </div>
          ))}
          <div style={{padding:"16px 20px"}}>
            <button style={S.primaryBtn(accentBlue)} onClick={handleGen} disabled={loading}>
              {loading?"⏳ GENERATING...":"▶ GENERATE DATASET"}
            </button>
            {gen&&<div style={{marginTop:"12px",background:`${accentBlue}11`,border:`1px solid ${accentBlue}33`,borderRadius:"6px",padding:"10px",fontSize:"11px",color:textSecondary}}>
              <span style={{color:accentBlue,fontWeight:"700"}}>Generated:</span> {gen.meta.nRows.toLocaleString()} rows · {gen.meta.segs.length} segs · {gen.meta.channels.length} channels<br/>
              <span style={{color:accentBlue}}>Columns:</span> HCP_ID · Month_ID · Seg_column{gen.meta.catVarNames.length>0?` · ${gen.meta.catVarNames.join(" · ")}`:""}  · {gen.meta.channels.join(" · ")} · Sales_with_noise · Brand<br/>
              <span style={{color:accentBlue}}>Transforms:</span> {gen.meta.channels.map((ch,i)=>gen.meta.chTr[i]).join(", ")}
            </div>}
          </div>
        </div>

                <PreviewPanel files={files} activeTab={tab} setActiveTab={setTab} tabKeys={["Panel","Config"]} onGenerate={handleGen} generating={loading} genColor={accentBlue}/>
      </div>
    </div>
  );
}

// ─── SCREEN: DMA Model Designer (Two-Step) ───────────────────────────────────
function DMADesigner({onBack}){
  const [step,setStep]   = useState(1);          // 1 = Base Data, 2 = DMA Data
  const [baseGen,setBaseGen] = useState(null);   // generated base rows
  const [dmaGen,setDmaGen]   = useState(null);   // generated dma rows
  const [tab,setTab]     = useState("Base");
  const [loading,setLoading] = useState(false);

  // ── STEP 1 STATE — Base Data (mirrors Basic Model config) ─────────────────
  const [baseCfg,setBaseCfg] = useState({
    brand:"Brand", nDMA:10, startDate:"2022-10", endDate:"2024-12",
    nHCPPerDMA:50, segCol:"A",
    fieldChannels:["Total_calls","speaker_program","samples","copay_cards","virtual_calls","Phone_calls"],
    digitalChannels:["paid_search_impressions","bannerads_impressions","socialmedia_impressions","email_delivered"],
    specialties:["ONC","PCPs","URO","NP/PAs"],
  });
  const [newFieldCh,setNewFieldCh]     = useState("");
  const [newDigitalCh,setNewDigitalCh] = useState("");
  const [newSpec,setNewSpec]           = useState("");
  // Base step accordions
  const [openBase,setOpenBase] = useState({identity:true,structure:false,fieldch:false,digitalch:false,specs:false});
  const toggleBase = k => setOpenBase(o=>({...o,[k]:!o[k]}));

  // ── STEP 2 STATE — DMA Data config ────────────────────────────────────────
  const [dmaCfg,setDmaCfg] = useState({
    dmaChannels:["TV","Radio","OOH","Print","Digital","Cinema"],   // DMA-level channels (like NC_1, NC_2 in samples)
    extraMonthsBefore:2,
  });
  const [newDmaCh,setNewDmaCh] = useState("");
  // DMA step accordions
  const [openDMA,setOpenDMA] = useState({channels:true,months:false});
  const toggleDMA = k => setOpenDMA(o=>({...o,[k]:!o[k]}));

  // ── Helpers ───────────────────────────────────────────────────────────────
  const addItem=(setter,key,val,setVal)=>{
    const v=val.trim();
    if(!v) return;
    setter(c=>({...c,[key]:c[key].includes(v)?c[key]:[...c[key],v]}));
    setVal("");
  };
  const removeItem=(setter,key,v)=>setter(c=>({...c,[key]:c[key].filter(x=>x!==v)}));

  const chip=(color,label,onX)=>(
    <span key={label} style={{display:"inline-flex",alignItems:"center",gap:"5px",fontSize:"10px",
      padding:"3px 9px",borderRadius:"20px",background:`${color}18`,border:`1px solid ${color}44`,color,fontWeight:"600"}}>
      {label}<span onClick={onX} style={{cursor:"pointer",opacity:0.7,fontWeight:"900"}}>×</span>
    </span>
  );

  const addRow=(icon,label,input,onAdd)=>(
    <div style={{display:"flex",gap:"6px",marginBottom:"10px"}}>
      <input style={{...S.input,flex:1}} placeholder={`Add ${label}…`}
        value={input.val} onChange={e=>input.set(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&onAdd()}/>
      <button onClick={onAdd}
        style={{...S.primaryBtn(accentAmber),width:"auto",padding:"8px 12px",marginTop:0,whiteSpace:"nowrap"}}>
        {icon} Add
      </button>
    </div>
  );

  // ── STEP 1: Generate Base Data ────────────────────────────────────────────
  const handleGenBase = useCallback(()=>{
    setLoading(true);
    setTimeout(()=>{
      try {
        const result = buildDMAPair({...baseCfg, dmaChannels:[]}); // no DMA channels in base step
        setBaseGen(result.baseRows);
        setTab("Base");
        // Auto-advance to step 2
        setStep(2);
      } catch(e){ console.error(e); }
      setLoading(false);
    },50);
  },[baseCfg]);

  // ── STEP 2: Generate DMA Data from Base ───────────────────────────────────
  const handleGenDMA = useCallback(()=>{
    if(!baseGen) return;
    const brand = baseCfg.brand||"Brand";

    // ── Step A: Aggregate Brand_Trx per DMA×Month from base rows ─────────────
    // Key = DMA + "_" + Month_ID guarantees one row per unique combination
    const agg={};
    baseGen.forEach(r=>{
      const key=`${r.DMA}_${r.Month_ID}`;
      if(!agg[key]) agg[key]={DMA:r.DMA, Month_ID:r.Month_ID, Brand_Trx:0};
      agg[key].Brand_Trx+=r.Brand_Trx;
    });

    // ── Step B: Build extra lag months before base start ──────────────────────
    // Use shiftMonthBack to get clean YYYYMM integers — no duplicate risk
    const dmas = [...new Set(baseGen.map(r=>r.DMA))].sort();
    const baseMonthInts = new Set(Object.values(agg).map(r=>r.Month_ID));

    const extraAgg={};  // keyed same way to prevent any overlap with base months
    if(dmaCfg.extraMonthsBefore > 0){
      for(let i=dmaCfg.extraMonthsBefore; i>=1; i--){
        const lagYYMM = shiftMonthBack(baseCfg.startDate, i); // returns "YYYY-MM"
        const lagInt  = parseInt(lagYYMM.replace("-",""));    // YYYYMM integer
        // Skip if this month somehow already exists in base data
        if(baseMonthInts.has(lagInt)) continue;
        dmas.forEach(dma=>{
          const key=`${dma}_${lagInt}`;
          if(!extraAgg[key]){
            extraAgg[key]={DMA:dma, Month_ID:lagInt, Brand_Trx:Math.round(rnd(500,5000))};
          }
        });
      }
    }

    // ── Step C: Merge, deduplicate on DMA×Month_ID, add channel cols ─────────
    // Combine extra lag rows first, then base-aggregated rows
    // Final dedup map ensures the composite key is always unique
    const finalMap={};
    [...Object.values(extraAgg), ...Object.values(agg)].forEach(row=>{
      const key=`${row.DMA}_${row.Month_ID}`;
      finalMap[key]=row; // base rows win over extra rows if overlap
    });

    const dmaRows = Object.values(finalMap)
      .map(row=>{
        const out={DMA:row.DMA, Month_ID:row.Month_ID, Brand_Trx:row.Brand_Trx};
        // DMA-level channels — one float per channel per DMA×Month
        dmaCfg.dmaChannels.forEach(ch=>{ out[ch]=parseFloat(rnd(0.1,2.2).toFixed(5)); });
        out.Brand=brand;
        return out;
      })
      .sort((a,b)=>String(a.DMA).localeCompare(String(b.DMA))||a.Month_ID-b.Month_ID);

    setDmaGen(dmaRows);
    setTab("DMA");
  },[baseGen,baseCfg,dmaCfg]);

  // ── File map for preview ──────────────────────────────────────────────────
  const brandName = baseCfg.brand||"Brand";
  const files = (baseGen||dmaGen) ? {
    ...(baseGen ? {Base:{label:`Base_Data_${brandName}.csv`, rows:baseGen}} : {}),
    ...(dmaGen  ? {DMA: {label:`DMA_Data_${brandName}.csv`,  rows:dmaGen}}  : {}),
  } : null;
  const tabKeys = [
    ...(baseGen ? ["Base"] : []),
    ...(dmaGen  ? ["DMA"]  : []),
  ];

  // ── Step indicator helper ─────────────────────────────────────────────────
  const StepIndicator = ()=>(
    <div style={{display:"flex",alignItems:"center",gap:"0",marginBottom:"20px"}}>
      {[
        {n:1,label:"Base Data",done:!!baseGen},
        {n:2,label:"DMA Data",done:!!dmaGen},
      ].map(({n,label,done},i)=>(
        <React.Fragment key={n}>
          {i>0&&<div style={{flex:1,height:"2px",background:baseGen?accent:border,margin:"0 8px"}}/>}
          <div onClick={()=>{ if(n===1||(n===2&&baseGen)) setStep(n); }}
            style={{display:"flex",alignItems:"center",gap:"8px",cursor:n===1||(n===2&&baseGen)?"pointer":"default"}}>
            <div style={{width:"28px",height:"28px",borderRadius:"50%",display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:"12px",fontWeight:"700",flexShrink:0,
              background: done?accent:(step===n?`${accent}33`:`${border}`),
              border:`2px solid ${done||step===n?accent:border}`,
              color: done?bg:(step===n?accent:textSecondary)}}>
              {done?"✓":n}
            </div>
            <span style={{fontSize:"12px",fontWeight:"700",
              color:done?accent:(step===n?textPrimary:textSecondary)}}>{label}</span>
          </div>
        </React.Fragment>
      ))}
    </div>
  );

  // ── Accordion renderer ────────────────────────────────────────────────────
  const Accordion = ({sections, open, toggle, color})=>(
    <div style={{border:`1px solid ${border}`,borderRadius:"8px",overflow:"hidden"}}>
      {sections.map(({key,label,icon,summary,content},i)=>(
        <div key={key} style={{borderBottom: i<sections.length-1?`1px solid ${border}`:"none"}}>
          <button onClick={()=>toggle(key)} style={{
            width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"13px 16px",background:"transparent",border:"none",cursor:"pointer",
            fontFamily:"inherit",textAlign:"left",gap:"10px",
          }}>
            <div style={{display:"flex",alignItems:"center",gap:"10px",minWidth:0}}>
              <span style={{fontSize:"15px",flexShrink:0}}>{icon}</span>
              <div style={{minWidth:0}}>
                <div style={{fontSize:"12px",fontWeight:"700",color:open[key]?color:textPrimary,letterSpacing:"0.04em"}}>{label}</div>
                {!open[key]&&<div style={{fontSize:"10px",color:textSecondary,marginTop:"2px",
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"270px"}}>{summary}</div>}
              </div>
            </div>
            <span style={{color:open[key]?color:textSecondary,fontSize:"14px",flexShrink:0,
              transition:"transform 0.2s",transform:open[key]?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
          </button>
          {open[key]&&<div style={{padding:"4px 16px 16px"}}>{content}</div>}
        </div>
      ))}
    </div>
  );

  // ── STEP 1 SECTIONS ───────────────────────────────────────────────────────
  const baseMonthCount = generateMonths(baseCfg.startDate,baseCfg.endDate).length;
  const step1Sections = [
    {
      key:"identity", label:"Brand & Dates", icon:"🏷️",
      summary:`${baseCfg.brand} · ${baseCfg.startDate} → ${baseCfg.endDate} · Seg: ${baseCfg.segCol}`,
      content:(
        <>
          <Field label="Brand Name"><Input value={baseCfg.brand} onChange={v=>setBaseCfg(c=>({...c,brand:v}))}/></Field>
          <Field label="Segment Code (Seg_col)"><Input value={baseCfg.segCol} onChange={v=>setBaseCfg(c=>({...c,segCol:v}))}/></Field>
          <div style={S.grid2}>
            <Field label="Start (YYYY-MM)"><Input value={baseCfg.startDate} onChange={v=>setBaseCfg(c=>({...c,startDate:v}))}/></Field>
            <Field label="End (YYYY-MM)"><Input value={baseCfg.endDate} onChange={v=>setBaseCfg(c=>({...c,endDate:v}))}/></Field>
          </div>
        </>
      )
    },
    {
      key:"structure", label:"DMA & HCP Structure", icon:"🗺️",
      summary:`${baseCfg.nDMA} DMAs · ${baseCfg.nHCPPerDMA} HCPs/DMA · ${baseMonthCount} months · ~${(baseCfg.nDMA*baseCfg.nHCPPerDMA*baseMonthCount).toLocaleString()} rows`,
      content:(
        <div style={S.grid2}>
          <Field label="# DMA Geographies"><NumInput value={baseCfg.nDMA} onChange={v=>setBaseCfg(c=>({...c,nDMA:Math.max(1,v)}))}/></Field>
          <Field label="# HCPs per DMA"><NumInput value={baseCfg.nHCPPerDMA} onChange={v=>setBaseCfg(c=>({...c,nHCPPerDMA:Math.max(1,v)}))}/></Field>
        </div>
      )
    },
    {
      key:"fieldch", label:"Field Channels (HCP-level)", icon:"📋",
      summary:`${baseCfg.fieldChannels.length} channels · ${baseCfg.fieldChannels.slice(0,3).join(", ")}${baseCfg.fieldChannels.length>3?" …":""}`,
      content:(
        <>
          <div style={{fontSize:"10px",color:textSecondary,marginBottom:"8px",lineHeight:"1.5"}}>Float values per HCP per month — represent individual rep activity</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"8px"}}>
            {baseCfg.fieldChannels.map(ch=>chip(accentAmber,ch,()=>removeItem(setBaseCfg,"fieldChannels",ch)))}
          </div>
          {addRow("📋","field channel",{val:newFieldCh,set:setNewFieldCh},()=>addItem(setBaseCfg,"fieldChannels",newFieldCh,setNewFieldCh))}
        </>
      )
    },
    {
      key:"digitalch", label:"Digital Channels (DMA-level)", icon:"📡",
      summary:`${baseCfg.digitalChannels.length} channels · ${baseCfg.digitalChannels.slice(0,2).join(", ")}${baseCfg.digitalChannels.length>2?" …":""}`,
      content:(
        <>
          <div style={{fontSize:"10px",color:textSecondary,marginBottom:"8px",lineHeight:"1.5"}}>Integer impressions per DMA per month — same for all HCPs in that DMA</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"8px"}}>
            {baseCfg.digitalChannels.map(ch=>chip(accentBlue,ch,()=>removeItem(setBaseCfg,"digitalChannels",ch)))}
          </div>
          {addRow("📡","digital channel",{val:newDigitalCh,set:setNewDigitalCh},()=>addItem(setBaseCfg,"digitalChannels",newDigitalCh,setNewDigitalCh))}
        </>
      )
    },
    {
      key:"specs", label:"HCP Specialties", icon:"🩺",
      summary:`${baseCfg.specialties.join(", ")}`,
      content:(
        <>
          <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"8px"}}>
            {baseCfg.specialties.map(s=>chip(accent,s,()=>removeItem(setBaseCfg,"specialties",s)))}
          </div>
          {addRow("🩺","specialty",{val:newSpec,set:setNewSpec},()=>addItem(setBaseCfg,"specialties",newSpec,setNewSpec))}
        </>
      )
    },
  ];

  // ── STEP 2 SECTIONS ───────────────────────────────────────────────────────
  const step2Sections = [
    {
      key:"channels", label:"DMA-Level Channels", icon:"📡",
      summary:`${dmaCfg.dmaChannels.length} channel${dmaCfg.dmaChannels.length!==1?"s":""} · ${dmaCfg.dmaChannels.slice(0,4).join(", ")}${dmaCfg.dmaChannels.length>4?" …":""}`,
      content:(
        <>
          <div style={{fontSize:"10px",color:textSecondary,marginBottom:"10px",lineHeight:"1.6"}}>
            DMA-level media channels — one continuous float value per channel per DMA per month.<br/>
            These appear as columns in the DMA file (e.g. TV, Radio, OOH, Newspaper).
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"10px"}}>
            {dmaCfg.dmaChannels.map(ch=>(
              <span key={ch} style={{display:"inline-flex",alignItems:"center",gap:"5px",fontSize:"10px",
                padding:"3px 9px",borderRadius:"20px",background:`${accentAmber}18`,
                border:`1px solid ${accentAmber}44`,color:accentAmber,fontWeight:"600"}}>
                {ch}
                <span onClick={()=>setDmaCfg(c=>({...c,dmaChannels:c.dmaChannels.filter(x=>x!==ch)}))}
                  style={{cursor:"pointer",opacity:0.7,fontWeight:"900",lineHeight:1}}>×</span>
              </span>
            ))}
          </div>
          <div style={{display:"flex",gap:"6px"}}>
            <input style={{...S.input,flex:1}} placeholder="Add DMA channel (e.g. TV, Radio, OOH)…"
              value={newDmaCh} onChange={e=>setNewDmaCh(e.target.value)}
              onKeyDown={e=>{
                if(e.key==="Enter"&&newDmaCh.trim()){
                  const v=newDmaCh.trim().replace(/\s+/g,"_");
                  if(!dmaCfg.dmaChannels.includes(v)) setDmaCfg(c=>({...c,dmaChannels:[...c.dmaChannels,v]}));
                  setNewDmaCh("");
                }
              }}/>
            <button onClick={()=>{
                const v=newDmaCh.trim().replace(/\s+/g,"_");
                if(v&&!dmaCfg.dmaChannels.includes(v)) setDmaCfg(c=>({...c,dmaChannels:[...c.dmaChannels,v]}));
                setNewDmaCh("");
              }}
              style={{...S.primaryBtn(accentAmber),width:"auto",padding:"8px 14px",marginTop:0,whiteSpace:"nowrap"}}>
              + Add
            </button>
          </div>
          <div style={{marginTop:"10px",fontSize:"10px",color:textSecondary,lineHeight:"1.5",
            background:`${accentAmber}0D`,border:`1px solid ${accentAmber}22`,borderRadius:"5px",padding:"7px 10px"}}>
            💡 Values are continuous floats in range ~0.1–2.2 per DMA×Month, representing indexed channel activity (e.g. GRP indices, reach scores)
          </div>
        </>
      )
    },
    {
      key:"months", label:"Extra Lag Months", icon:"📅",
      summary:`${dmaCfg.extraMonthsBefore} extra month${dmaCfg.extraMonthsBefore!==1?"s":""} before ${baseCfg.startDate} in DMA file`,
      content:(
        <>
          <Field label="Extra months before Base start date">
            <NumInput value={dmaCfg.extraMonthsBefore} onChange={v=>setDmaCfg(c=>({...c,extraMonthsBefore:Math.max(0,Math.min(24,v))}))}/>
            <span style={{fontSize:"10px",color:textSecondary,marginTop:"4px",display:"block"}}>
              DMA file extends back {dmaCfg.extraMonthsBefore} month{dmaCfg.extraMonthsBefore!==1?"s":""} before <strong style={{color:accentAmber}}>{baseCfg.startDate}</strong> with estimated TRx — used as sales lag warmup
            </span>
          </Field>
        </>
      )
    },
  ];

  // ── RENDER ────────────────────────────────────────────────────────────────
  return(
    <div style={S.app}>
      <div style={{...S.header,paddingBottom:"18px"}}>
        <h1 style={S.title}><BackBtn onBack={onBack}/><span style={S.badge(accentAmber)}>DMA</span>DMA Model Dataset Pair</h1>
        <p style={S.subtitle}>Two-step generation · <strong style={{color:accentAmber}}>Base_Data_{baseCfg.brand}.csv</strong> then <strong style={{color:accentAmber}}>DMA_Data_{baseCfg.brand}.csv</strong></p>
      </div>
      <div style={S.mainGrid}>

        {/* ── LEFT PANEL ── */}
        <div style={{...S.panel,maxHeight:"88vh",overflowY:"auto",padding:"20px"}}>
          <StepIndicator/>

          {/* STEP 1 */}
          {step===1&&(
            <>
              <div style={{fontSize:"10px",fontWeight:"700",color:accentAmber,letterSpacing:"0.12em",marginBottom:"12px"}}>
                STEP 1 — CONFIGURE BASE DATA
              </div>
              <Accordion sections={step1Sections} open={openBase} toggle={toggleBase} color={accentAmber}/>
              <div style={{marginTop:"14px",background:`${accentAmber}0D`,border:`1px solid ${accentAmber}22`,borderRadius:"6px",padding:"8px 12px",fontSize:"10px",color:textSecondary,lineHeight:"1.7",marginBottom:"12px"}}>
                <strong style={{color:accentAmber}}>Base_Data_{baseCfg.brand}.csv</strong><br/>
                Customer_ID · Month_ID · DMA · Brand_Trx · {baseCfg.fieldChannels.concat(baseCfg.digitalChannels).slice(0,4).join(" · ")}{baseCfg.fieldChannels.concat(baseCfg.digitalChannels).length>4?" … ":""} · specialtygrouping · brand · Seg_col<br/>
                ≈ <strong style={{color:accentAmber}}>{(baseCfg.nDMA*baseCfg.nHCPPerDMA*baseMonthCount).toLocaleString()}</strong> rows
              </div>
              <button style={{...S.primaryBtn(accentAmber),marginTop:0}} onClick={handleGenBase} disabled={loading}>
                {loading?"⏳ Generating…":"▶ Generate Base Data →"}
              </button>
            </>
          )}

          {/* STEP 2 */}
          {step===2&&(
            <>
              <div style={{fontSize:"10px",fontWeight:"700",color:accentAmber,letterSpacing:"0.12em",marginBottom:"12px"}}>
                STEP 2 — CONFIGURE DMA DATA
              </div>
              {/* Locked summary of Step 1 */}
              <div style={{background:surfaceLight,border:`1px solid ${accent}33`,borderRadius:"7px",padding:"10px 14px",marginBottom:"14px",fontSize:"10px",color:textSecondary,lineHeight:"1.8"}}>
                <div style={{fontSize:"11px",fontWeight:"700",color:accent,marginBottom:"4px"}}>✓ Base Data ready</div>
                {baseCfg.brand} · {baseCfg.nDMA} DMAs · {baseCfg.nHCPPerDMA} HCPs/DMA · {baseMonthCount} months<br/>
                {baseGen?.length.toLocaleString()} rows generated
                <button onClick={()=>setStep(1)} style={{display:"block",marginTop:"6px",background:"none",border:`1px solid ${border}`,borderRadius:"5px",padding:"3px 10px",fontSize:"10px",color:textSecondary,cursor:"pointer",fontFamily:"inherit"}}>
                  ← Edit Base Config
                </button>
              </div>

              <Accordion sections={step2Sections} open={openDMA} toggle={toggleDMA} color={accentAmber}/>

              <div style={{marginTop:"14px",background:`${accentAmber}0D`,border:`1px solid ${accentAmber}22`,borderRadius:"6px",padding:"8px 12px",fontSize:"10px",color:textSecondary,lineHeight:"1.7",marginBottom:"12px"}}>
                <strong style={{color:accentAmber}}>DMA_Data_{baseCfg.brand}.csv</strong><br/>
                DMA · Month_ID · Brand_Trx · {dmaCfg.dmaChannels.slice(0,4).join(" · ")}{dmaCfg.dmaChannels.length>4?" … ":""} · Brand<br/>
                ≈ <strong style={{color:accentAmber}}>{(baseCfg.nDMA*(baseMonthCount+dmaCfg.extraMonthsBefore)).toLocaleString()}</strong> rows
                {dmaCfg.extraMonthsBefore>0&&<span> (incl. {dmaCfg.extraMonthsBefore} lag month{dmaCfg.extraMonthsBefore!==1?"s":""})</span>}
              </div>
              <button style={{...S.primaryBtn(accentAmber),marginTop:0}} onClick={handleGenDMA} disabled={!baseGen}>
                ▶ Generate DMA Data
              </button>
            </>
          )}
        </div>

        {/* ── RIGHT PANEL ── */}
        <PreviewPanel
          files={files} activeTab={tab} setActiveTab={setTab} tabKeys={tabKeys}
          onGenerate={step===1?handleGenBase:handleGenDMA}
          generating={loading}
          genDisabled={step===2&&!baseGen}
          genColor={accentAmber}
        />
      </div>
    </div>
  );
}

// ─── Root Router ──────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("landing");

  if(screen==="external")     return <ExternalDesigner onBack={()=>setScreen("landing")}/>;
  if(screen==="internal")     return <InternalSubScreen onSelect={setScreen} onBack={()=>setScreen("landing")}/>;
  if(screen==="basicmodel")   return <BasicModelDesigner onBack={()=>setScreen("internal")}/>;
  if(screen==="dma")          return <DMADesigner onBack={()=>setScreen("internal")}/>;
  return <LandingScreen onSelect={setScreen}/>;
}


    try {
      const rootEl = document.getElementById('root');
      const root = ReactDOM.createRoot(rootEl);
      root.render(React.createElement(App));
    } catch(e) {
      document.getElementById('root').innerHTML =
        '<div style="color:#ff6b6b;padding:40px;font-family:monospace;background:#0A0E1A;min-height:100vh">' +
        '<h2 style="margin-bottom:16px">Error: ' + e.message + '</h2>' +
        '<pre style="font-size:12px;color:#8899BB">' + (e.stack||'') + '</pre></div>';
    }
  </script>
</body>
</html>
